    <style>
        main img {
            max-height: 100%;
            object-fit: contain;
        }
        canvas-table {
            width: 100%;
            height: 100%;
            display: block;
        }
        .CodeMirror {
            flex: 1 1 0%;
            height: 100%;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
        }
        #sidebar {
            width: 300px;
        }
        .tree-item:hover .action-btns {
            display: flex;
        }
        .active-file {
            background-color: rgba(59, 130, 246, 0.4);
        }
        .dirty::after {
            content: '*';
            color: #fbbf24;
            margin-left: 4px;
            font-weight: bold;
        }
        .folder-toggle::before {
            content: '▶';
            display: inline-block;
            margin-right: 6px;
            font-size: 0.7rem;
            transition: transform 0.2s;
        }
        .folder-toggle.open::before {
            transform: rotate(90deg);
        }
        .category-header::before {
            content: '▶';
            display: inline-block;
            margin-right: 8px;
            font-size: 0.7rem;
            transition: transform 0.2s;
        }
        .category-header.open::before {
            transform: rotate(90deg);
        }
        .snippet-container {
            display: none;
        }
        .snippet-container.open {
            display: block;
        }
        .indent-line {
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .create-type-btn.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;

    <script>
        class SelectableCanvasTableModel extends CanvasTableModel{
            constructor(header, data){
                super(header, data);
                Object.assign(this, {
                    selection: null,
                    isSelecting: false,
                    copyDataFilter(value){
                        if(value == null){
                            return "";
                        }
                        if(typeof value === 'number'){
                            return value.toString(10);
                        }
                        if(typeof value === 'boolean'){
                            return value ? "true" : "false";
                        }
                        return "\"" + `${value}`.replaceAll("\"", "\"\"") + "\"";
                    },
                    copyColumnSeparator: "\t",
                    copyRowSeparator: "\n"
                });

                // イベントリスナーの設定
                this.addEventListener("table-attache", e => {
                    e.element.addEventListener("dragend", this.onMouseUp);
                    e.element.addEventListener("copy", this.onCopy);
                });
                this.addEventListener("table-detache", e => {
                    e.element.removeEventListener("dragend", this.onMouseUp);
                    e.element.removeEventListener("copy", this.onCopy);
                });
                this.addEventListener("table-click", this.onClick);
                this.addEventListener("table-dragstart", this.onMouseDown);
                this.addEventListener("table-drag", this.onMouseMove);
            }
            onMouseUp(e){
                const {table} = e.target;
                table.isSelecting = false;
            }
            onCopy(e){
                const {ctx, table} = e.target;
                if(!table.selection){
                    return;
                }
                const {start, end} = table.selection;
                const minRow = Math.min(start.row, end.row);
                const maxRow = Math.max(start.row, end.row);
                const minCol = Math.min(start.col, end.col);
                const maxCol = Math.max(start.col, end.col);
                const data = [];
                for(let rowNo = minRow; rowNo <= maxRow; rowNo++){
                    const rowData = [];
                    for(let columnNo = minCol; columnNo <= maxCol; columnNo++){
                        rowData.push(table.copyDataFilter(table.data.at(rowNo).at(columnNo)));
                    }
                    data.push(rowData.join(table.copyColumnSeparator));
                }
                e.clipboardData.setData("text/plain", data.join(table.copyRowSeparator));
                e.preventDefault();
            }
            onClick(e){
                const target = e.target;
                if(e.addr.rowNo === null || e.addr.columnNo === null){
                    target.selection = null;
                    e.element.rerender();
                    return;
                };
                target.selection = {
                    start: {row: e.addr.rowNo, col: e.addr.columnNo},
                    end: {row: e.addr.rowNo, col: e.addr.columnNo}
                };
                e.element.rerender();
            }
            onMouseDown(e){
                const target = e.target;
                if(e.addr.rowNo === null || e.addr.columnNo === null){
                    target.selection = null;
                    e.element.rerender();
                    return;
                }
                target.isSelecting = true;
                target.selection = {
                    start: {row: e.addr.rowNo, col: e.addr.columnNo},
                    end: {row: e.addr.rowNo, col: e.addr.columnNo}
                };
                e.element.rerender();
            }
            onMouseMove(e){
                const target = e.target;
                if (!target.isSelecting || e.addr.rowNo === null || e.addr.columnNo === null) return;

                // 終了地点を更新
                target.selection.end = { row: e.addr.rowNo, col: e.addr.columnNo };
                e.element.rerender();
            }

            /**
             * セル描画のオーバーライド
             */
            drawData(renderer, rowNo, columnNo){
                renderer.border("rgba(255,255,255,0.15)", 1);
                if(rowNo == null){
                    if(columnNo == null){
                        renderer.background = "#1f2937";
                        return;
                    }
                    renderer.background = "#1f2937";
                    renderer.addText({
                        textAlign: "center",
                        textBaseline: "middle",
                        shrinkToFit: true,
                        padding: 2
                    }).add(this.header[columnNo], "white", "12px 'Fira Code', monospace");
                    return;
                }
                if(columnNo == null){
                    renderer.background = "#282a36";
                    renderer.addText({
                        textAlign: "right",
                        textBaseline: "middle",
                        shrinkToFit: true,
                        padding: 2
                    }).add(rowNo + 1, "#6d8a88", "12px 'Fira Code', monospace");
                    return;
                }
                let data = this.data.at(rowNo).at(columnNo);
                let dataTextAlign = "left";
                let textColor = "#ffffff";
                if(typeof data === 'number'){
                    dataTextAlign = "right";
                    textColor = "#bd93f9";
                }
                renderer.background = "#282a36";
                if(data == null){
                    renderer.addText({
                        textAlign: "center",
                        textBaseline: "middle",
                        shrinkToFit: true,
                        padding: 2
                    }).add("NULL", "#6d8a88", "12px 'Fira Code', monospace");
                }else{
                    renderer.addText({
                        textAlign: dataTextAlign,
                        textBaseline: "middle",
                        shrinkToFit: true,
                        padding: 2
                    }).add(data, textColor, "12px 'Fira Code', monospace");
                }
            }

            /**
             * オーバーレイ描画のオーバーライド
             * 選択範囲の外枠に罫線を描画する
             */
            drawOverlay(object){
                if(!this.selection){
                    return;
                }
                const {ctx, table} = object;
                const {start, end} = this.selection;
                const minRow = Math.min(start.row, end.row);
                const maxRow = Math.max(start.row, end.row);
                const minCol = Math.min(start.col, end.col);
                const maxCol = Math.max(start.col, end.col);

                // 描画対象のセルが仮想表示範囲内にあるか確認して座標を計算
                let displayRect = { left: Infinity, top: Infinity, right: -Infinity, bottom: -Infinity };
                let visible = false;

                // 表示されているセルの中から選択範囲に含まれるものの座標を合算
                for(let col of this.virtual.columns){
                    if(col.index >= minCol && col.index <= maxCol){
                        displayRect.left = Math.min(displayRect.left, col.x);
                        displayRect.right = Math.max(displayRect.right, col.x + col.width);
                        visible = true;
                    }
                }
                for(let row of this.virtual.rows){
                    if(row.index >= minRow && row.index <= maxRow){
                        displayRect.top = Math.min(displayRect.top, row.y);
                        displayRect.bottom = Math.max(displayRect.bottom, row.y + row.height);
                        visible = true;
                    }
                }
                if(!visible || displayRect.left === Infinity){
                    return;
                }

                // 選択範囲の枠線を描画
                ctx.save();
                ctx.strokeStyle = "#4b89ff";
                ctx.lineWidth = 3;
                ctx.setLineDash([]);
                ctx.strokeRect(
                    displayRect.left, 
                    displayRect.top, 
                    displayRect.right - displayRect.left, 
                    displayRect.bottom - displayRect.top
                );
                ctx.fillStyle = "rgba(75, 137, 255, 0.1)";
                ctx.fillRect(
                    displayRect.left, 
                    displayRect.top, 
                    displayRect.right - displayRect.left, 
                    displayRect.bottom - displayRect.top
                );
                ctx.restore();
            }
        }

        const SNIPPETS_FILENAME = '.snippets';
        const DEFAULT_SNIPPETS = `カテゴリ別スニペット\n\n## Common\n\n### Console Log\nconsole.log('');\n`;
        const DB_NAME = 'FSEditorDB';
        const STORE_NAME = 'handles';
        initSqlJs({locateFile(file){return `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.2.1/dist/${file}`;}}).then(a => {
            self.Database = function (ba, filename = null){
                const obj = Object.create(
                    a.Database.prototype,
                    filename == null ? {} : {
                        filename: {
                            value: filename.replaceAll('/', '-'),
                            writable: false,
                            configurable: true
                        }
                    }
                );
                obj.constructor(ba);
                return obj;
            };
        });

        // IndexedDB
        async function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = () => request.result.createObjectStore(STORE_NAME);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveHandle(handle) {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(handle, 'rootDirectory');
        }

        async function getHandle() {
            const db = await openDB();
            return new Promise((resolve) => {
                const request = db.transaction(STORE_NAME).objectStore(STORE_NAME).get('rootDirectory');
                request.onsuccess = () => resolve(request.result);
            });
        }

        /**
         * App State
         */
        const state = {
            editor: null,
            rootHandle: null,
            files: new Map(), // path -> { handle, doc, isDirty }
            folders: new Map(), // path -> handle
            expandedFolders: new Set(['/']),
            activeFilePath: null,
            targetFolder: '/', // For new item creation
            createType: 'file', // 'file' or 'folder'
            cdn: null // For import
        };

        const DOM = {
            btnOpenDir: document.getElementById('btn-open-dir'),
            btnRestoreDir: document.getElementById('btn-restore-dir'),
            btnSave: document.getElementById('btn-save'),
            btnImport: document.getElementById('btn-import'),
            btnExecute: document.getElementById('btn-execute'),
            fileTree: document.getElementById('file-tree'),
            snippetLabel: document.getElementById('snippet-label'),
            snippetCategories: document.getElementById('snippet-categories'),
            tabFiles: document.getElementById('tab-files'),
            tabSnippets: document.getElementById('tab-snippets'),
            containerFiles: document.getElementById('file-list-container'),
            containerSnippets: document.getElementById('snippet-list-container'),
            pathDisplay: document.getElementById('current-file-path'),
            modal: document.getElementById('modal-overlay'),

            targetFolderDisplay: document.getElementById('target-folder-display'),
            btnCancelModal: document.getElementById('btn-cancel-modal'),

            btnCancelImportModal: document.getElementById('btn-cancel-import-modal'),
            btnCheckImportModal: document.getElementById('btn-check-import-modal'),
            btnConfirmImportModal: document.getElementById('btn-confirm-import-modal'),
            inputImportSource: document.getElementById('import-source-name'),
            inputImportPackage: document.getElementById('import-package-name'),
            packageArea: document.getElementById('package-area'),
            typeFile: document.getElementById('type-file'),
            typeFolder: document.getElementById('type-folder'),
            viewImage: document.getElementById('view-image'),
            viewInfo: document.getElementById('view-info'),
            viewDatabase: document.getElementById('view-database')
        };

        /**
         * Initialize Editor
         */
        function initEditor() {
            state.editor = CodeMirror.fromTextArea(document.getElementById('editor-textarea'), {
                lineNumbers: true,
                theme: 'dracula',
                mode: 'javascript',
                indentUnit: 2,
                lineWrapping: true,
                foldGutter: true, 
                gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
                extraKeys: {
                    "Tab": (cm) => {
                        if (cm.somethingSelected()) cm.execCommand("indentMore");
                        else cm.replaceSelection("  ");
                    },
                    "Ctrl-S": saveCurrentFile,
                    "Cmd-S": saveCurrentFile,
                    "Ctrl-F": "findPersistent",
                    "Cmd-F": "findPersistent",
                    "Ctrl-H": "replace",
                    "Cmd-H": "replace",
                    "Ctrl-G": "findNext",
                    "Cmd-G": "findNext"
                }
            });

            state.editor.on('change', () => {
                if (state.activeFilePath) {
                    const fileData = state.files.get(state.activeFilePath);
                    const fileType = getTypeByExtension(state.activeFilePath);
                    if (fileData && !fileType.binary && !fileData.doc.isClean()) {
                        if (!fileData.isDirty) {
                            fileData.isDirty = true;
                            renderFileTree();
                        }
                    }
                }
            });

            // 貼り付けイベントのカスタマイズ
            state.editor.on('paste', function(cmInstance, event) {
                const cursor = cmInstance.getCursor();
                const indentMatch = cmInstance.getLine(cursor.line).match(/^\s*/);
                if (indentMatch) {
                    const text = event.clipboardData.getData("text/plain");
                    const lines = text.replaceAll(/\r\n?/g, "\n").split('\n');
                    if (text.split('\n').length > 1) {
                        event.preventDefault();
                        const indent = indentMatch[0];
                        const formatted = lines.join('\n' + indent);
                        cmInstance.replaceRange(formatted, cursor);
                    }
                }
            });
        }

        function getTypeByExtension(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            switch (ext) {
                case 'js':
                    return {
                        binary: false,
                        mode: 'javascript'
                    };
                case 'css':
                    return {
                        binary: false,
                        mode: 'css'
                    };
                case 'json':
                    return {
                        binary: false,
                        mode: { name: "javascript", json: true }
                    };
                case 'html':
                case 'htm':
                    return {
                        binary: false,
                        mode: 'htmlmixed'
                    };
                case 'md':
                    return {
                        binary: false,
                        mode: 'markdown'
                    };
                case 'webp':
                case 'jpg':
                case 'jpeg':
                case 'png':
                case 'gif':
                    return {
                        binary: true,
                        mode: null,
                        view: 'image'
                    };
                case 'db':
                case 'sqlite3':
                    return {
                        binary: true,
                        mode: 'sql',
                        view: 'database'
                    };
                default:
                    return {
                        binary: false,
                        mode: 'text/plain'
                    };
            }
        }

        /**
         * Snippet Logic
         */
        function getContents(text, level = 1) {
            const re = new RegExp("\\n[ \\t\\r\\f\\v]*#{" + level + "} ", 'g');
            const tokens = ("\n" + text).split(re);
            const intro = (tokens.shift() + "\n").split(/\n[ \t\r\f\v]*([\-\*_])([ \t]*)(?:\1\2)+\1[ \t\r\f\v]*\n/g).filter((_, i) => (i % 4 == 0) || (i % 4 == 3));
            const last = intro.length - 1;
            intro[0] = intro[0].replace(/^\n/, '');
            if (intro[last]) intro[last] = intro[last].replace(/\n$/, '');
            if ((last == 0) && (intro[0] === '')) intro.pop();
            return intro.concat(tokens.map(sec => {
                const pos = sec.indexOf("\n");
                if (pos < 0) return {title: sec, content: []};
                return {title: sec.slice(0, pos), content: getContents(sec.slice(pos + 1), level + 1)}
            }));
        }

        async function updateSnippetUI() {
            const snippetsPath = '/' + SNIPPETS_FILENAME;
            const fileData = state.files.get(snippetsPath);
            if (!fileData) return;

            try {
                const file = await fileData.handle.getFile();
                const content = await file.text();
                const snippets = getContents(content, 2);
                
                DOM.snippetCategories.innerHTML = '';
                for (let category of snippets) {
                    if (typeof category === 'string') {
                        DOM.snippetLabel.textContent = category.trim();
                        continue;
                    }
                    const catWrapper = document.createElement('div');
                    const header = document.createElement('div');
                    header.className = 'category-header text-sm font-semibold text-gray-400 hover:text-white cursor-pointer px-2 py-1 bg-gray-700/30 rounded flex items-center';
                    header.textContent = category.title.trim();
                    
                    const itemContainer = document.createElement('ul');
                    itemContainer.className = 'snippet-container space-y-1 p-2 ml-2 border-l border-gray-700';

                    header.onclick = () => {
                        header.classList.toggle('open');
                        itemContainer.classList.toggle('open');
                    };

                    for (let snippet of category.content) {
                        if (typeof snippet === 'string') continue;
                        for (let alt of snippet.content) {
                            const code = (typeof alt === 'string') ? alt : alt.toString();
                            const li = document.createElement('li');
                            li.className = 'p-1.5 bg-gray-700/50 rounded cursor-pointer hover:bg-gray-600 text-xs truncate border border-transparent hover:border-blue-500';
                            li.textContent = snippet.title.trim();
                            li.onclick = () => {
                                const doc = state.editor.getDoc();
                                const cursor = doc.getCursor();
                                const currentLine = doc.getLine(cursor.line);
                                const indent = (currentLine.match(/^\s*/) || [""])[0];
                                doc.replaceRange(code.replaceAll("\n", "\n" + indent), cursor);
                                state.editor.focus();
                            };
                            itemContainer.appendChild(li);
                        }
                    }
                    catWrapper.append(header, itemContainer);
                    DOM.snippetCategories.append(catWrapper);
                }
            } catch (err) {
                DOM.snippetCategories.innerHTML = '<div class="text-red-400 text-xs p-2">.snippets 読み込みエラー</div>';
            }
        }

        /**
         * FS Recursive Operations
         */
        async function scanDirectory(handle, path = '/') {
            state.folders.set(path, handle);
            for await (const entry of handle.values()) {
                const entryPath = path + (path === '/' ? '' : '/') + entry.name;
                if (entry.kind === 'file') {
                    if (!state.files.has(entryPath)) {
                        state.files.set(entryPath, { handle: entry, doc: null, data: null, isDirty: false });
                    }
                } else if (entry.kind === 'directory') {
                    await scanDirectory(entry, entryPath);
                }
            }
        }

        async function loadDirectory(handle) {
            state.rootHandle = handle;
            state.files.clear();
            state.folders.clear();
            DOM.btnRestoreDir.classList.add('hidden');
            DOM.btnImport.classList.remove('hidden');
            
            await scanDirectory(handle);
            
            const snippetsPath = '/' + SNIPPETS_FILENAME;
            if (!state.files.has(snippetsPath)) {
                try {
                    const sHandle = await handle.getFileHandle(SNIPPETS_FILENAME, { create: true });
                    const writable = await sHandle.createWritable();
                    await writable.write(DEFAULT_SNIPPETS);
                    await writable.close();
                    state.files.set(snippetsPath, { handle: sHandle, doc: null, data: null, isDirty: false });
                } catch(e) {}
            }

            renderFileTree();
            updateSnippetUI();
        }

        function renderFileTree() {
            DOM.fileTree.innerHTML = '';
            if (!state.rootHandle) return;
            
            const tree = { '/': { name: state.rootHandle.name, kind: 'directory', path: '/', children: [] } };
            const allPaths = [...state.folders.keys(), ...state.files.keys()].filter(p => p !== '/');
            allPaths.sort();

            const createNode = (path) => {
                const parts = path.split('/').filter(Boolean);
                const name = parts[parts.length - 1];
                const kind = state.folders.has(path) ? 'directory' : 'file';
                return { name, kind, path, children: [] };
            };

            const structure = new Map();
            structure.set('/', tree['/']);

            allPaths.forEach(path => {
                const node = createNode(path);
                structure.set(path, node);
                const parentPath = path.substring(0, path.lastIndexOf('/')) || '/';
                const parent = structure.get(parentPath);
                if (parent) parent.children.push(node);
            });

            const renderNode = (node, depth = 0) => {
                const container = document.createElement('div');
                const item = document.createElement('div');
                const isFolder = node.kind === 'directory';
                const isExpanded = state.expandedFolders.has(node.path);
                
                item.className = `tree-item group flex items-center justify-between py-1 px-2 rounded cursor-pointer hover:bg-gray-700/50 ${state.activeFilePath === node.path ? 'active-file' : ''}`;
                item.style.paddingLeft = `${depth * 12 + 8}px`;

                const labelWrapper = document.createElement('div');
                labelWrapper.className = 'flex items-center truncate flex-1';

                if (isFolder) {
                    const toggle = document.createElement('span');
                    toggle.className = `folder-toggle ${isExpanded ? 'open' : ''}`;
                    labelWrapper.appendChild(toggle);
                    
                    const folderIcon = document.createElement('span');
                    folderIcon.className = 'mr-2 text-yellow-500 opacity-70';
                    folderIcon.innerHTML = `<svg class="w-4 h-4 inline" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>`;
                    labelWrapper.appendChild(folderIcon);
                } else {
                    const fileIcon = document.createElement('span');
                    fileIcon.className = 'ml-4 mr-2 text-gray-400 opacity-60';
                    fileIcon.innerHTML = `<svg class="w-3.5 h-3.5 inline" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"></path></svg>`;
                    labelWrapper.appendChild(fileIcon);
                }

                const nameSpan = document.createElement('span');
                nameSpan.textContent = node.name;
                nameSpan.className = `truncate ${node.path === '/' + SNIPPETS_FILENAME ? 'text-blue-400 font-medium' : ''} ${state.files.get(node.path)?.isDirty ? 'dirty' : ''}`;
                labelWrapper.appendChild(nameSpan);
                item.appendChild(labelWrapper);

                const actions = document.createElement('div');
                actions.className = 'action-btns hidden space-x-1 ml-2';
                
                if (isFolder) {
                    const addBtn = document.createElement('button');
                    addBtn.innerHTML = '+';
                    addBtn.className = 'text-xs bg-blue-900/50 hover:bg-blue-600 px-1.5 rounded leading-none py-0.5';
                    addBtn.title = 'フォルダ内に作成';
                    addBtn.onclick = (e) => { e.stopPropagation(); showModal(node.path); };
                    actions.appendChild(addBtn);
                }

                if (node.path !== '/' && node.path !== '/' + SNIPPETS_FILENAME) {
                    const delBtn = document.createElement('button');
                    delBtn.innerHTML = '×';
                    delBtn.className = 'text-xs bg-red-900/50 hover:bg-red-600 px-1.5 rounded leading-none py-0.5';
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteEntry(node); };
                    actions.appendChild(delBtn);
                }
                item.appendChild(actions);

                item.onclick = () => {
                    if (isFolder) {
                        if (state.expandedFolders.has(node.path)) state.expandedFolders.delete(node.path);
                        else state.expandedFolders.add(node.path);
                        renderFileTree();
                    } else {
                        openFile(node.path);
                    }
                };

                container.appendChild(item);

                if (isFolder && isExpanded) {
                    const childrenContainer = document.createElement('div');
                    const childrenFragment = document.createDocumentFragment();
                    childrenContainer.className = 'indent-line';
                    node.children.sort((a, b) => {
                        if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
                        return a.name.localeCompare(b.name);
                    }).forEach(child => {
                        if (child.path === '/' + SNIPPETS_FILENAME) {
                            childrenFragment.appendChild(renderNode(child, depth + 1));
                        } else {
                            childrenContainer.appendChild(renderNode(child, depth + 1));
                        }
                    });
                    childrenContainer.appendChild(childrenFragment);
                    container.appendChild(childrenContainer);
                }

                return container;
            };

            DOM.fileTree.appendChild(renderNode(tree['/']));
        }

        async function openFile(path) {
            const fileData = state.files.get(path);
            if (!fileData) return;

            const fileType = getTypeByExtension(path);
            if (!fileData.doc) {
                const file = await fileData.handle.getFile();
                if (typeof fileType.mode === 'string' && !fileType.binary) {
                    const text = await file.text();
                    fileData.doc = CodeMirror.Doc(text, fileType.mode);
                } else if (fileType.view === 'image') {
                    const url = URL.createObjectURL(file);
                    fileData.data = {url};
                    fileData.doc = CodeMirror.Doc('', 'text/plain');
                } else if (fileType.view === 'database') {
                    const binary = await file.arrayBuffer();
                    const table = new SelectableCanvasTableModel([], []);
                    const info = Object.assign(new SelectableCanvasTableModel(['スキーマ', 'テーブル', 'フィールド'], []), {
                        hasRow: false,
                        hasHorizontalScrollbar: false,
                        getWidth(columnNo){
                            return 100;
                        },
                        copyDataFilter(value){
                            return `${value}`;
                        },
                        copyColumnSeparator: ".",
                        copyRowSeparator: ","
                    });
                    const db = new Database(new Uint8Array(binary), path);
                    info.hasHorizontalScrollbar = false;
                    fileData.data = {table, info, db};
                    refreshDbList(fileData.data);
                    fileData.doc = CodeMirror.Doc('', 'sql');
                } else {
                    fileData.doc = CodeMirror.Doc('', 'text/plain');
                }
            }

            if (typeof fileType.mode === 'string' && !fileType.binary) {
               state.editor.display.wrapper.hidden = false;
               DOM.viewImage.hidden = true;
               DOM.viewInfo.parentNode.hidden = true;
               DOM.viewDatabase.parentNode.hidden = true;
               DOM.btnExecute.classList.add('hidden');
               DOM.viewImage.removeAttribute('src');
            } else if (fileType.view === 'image') {
               state.editor.display.wrapper.hidden = true;
               DOM.viewImage.hidden = false;
               DOM.viewInfo.parentNode.hidden = true;
               DOM.viewDatabase.parentNode.hidden = true;
               DOM.btnExecute.classList.add('hidden');
               DOM.viewImage.setAttribute('src', fileData.data.url);
            } else if (fileType.view === 'database') {
               state.editor.display.wrapper.hidden = false;
               DOM.viewImage.hidden = true;
               DOM.viewInfo.parentNode.hidden = false;
               DOM.viewDatabase.parentNode.hidden = false;
               DOM.viewInfo.table = fileData.data.info;
               DOM.viewDatabase.table = fileData.data.table;
               DOM.btnExecute.classList.remove('hidden');
               DOM.viewImage.removeAttribute('src');
            } else {
               state.editor.display.wrapper.hidden = false;
               DOM.viewImage.hidden = true;
               DOM.viewInfo.parentNode.hidden = true;
               DOM.viewDatabase.parentNode.hidden = true;
               DOM.btnExecute.classList.add('hidden');
               DOM.viewImage.removeAttribute('src');
            }
            state.editor.swapDoc(fileData.doc);
            state.activeFilePath = path;
            DOM.pathDisplay.textContent = path;
            DOM.btnSave.disabled = false;
            DOM.btnSave.classList.remove('opacity-50', 'cursor-not-allowed');
            renderFileTree();
        }

        async function saveCurrentFile() {
            if (!state.activeFilePath) return;
            const fileData = state.files.get(state.activeFilePath);
            const fileType = getTypeByExtension(state.activeFilePath);
            
            try {
                const writable = await fileData.handle.createWritable();
                if (fileType.binary && fileType.view === 'database') {
                    await writable.write(fileData.data.db.export());
                } else {
                    await writable.write(state.editor.getValue());
                }
                await writable.close();
                
                fileData.isDirty = false;
                fileData.doc.markClean();
                renderFileTree();

                if (state.activeFilePath === '/' + SNIPPETS_FILENAME) await updateSnippetUI();

                const original = DOM.btnSave.textContent;
                DOM.btnSave.textContent = 'Saved';
                DOM.btnSave.className = DOM.btnSave.className.replace('bg-green-600', 'bg-green-800');
                setTimeout(() => {
                    DOM.btnSave.textContent = original;
                    DOM.btnSave.className = DOM.btnSave.className.replace('bg-green-800', 'bg-green-600');
                }, 800);
            } catch (err) { console.error(err); }
        }

        async function deleteEntry(node) {
            if (!confirm(`「${node.name}」を削除してもよろしいですか？`)) return;
            try {
                const parentPath = node.path.substring(0, node.path.lastIndexOf('/')) || '/';
                const parentHandle = state.folders.get(parentPath);
                await parentHandle.removeEntry(node.name, { recursive: true });
                
                if (node.kind === 'file') {
                    state.files.delete(node.path);
                    if (state.activeFilePath === node.path) {
                        state.activeFilePath = null;
                        state.editor.display.wrapper.hidden = false;
                        DOM.viewImage.hidden = true;
                        DOM.viewInfo.parentNode.hidden = true;
                        DOM.viewDatabase.parentNode.hidden = true;
                        DOM.btnExecute.classList.add('hidden');
                        state.editor.setValue('');
                        DOM.btnSave.disabled = true;
                        DOM.pathDisplay.textContent = 'ファイルを選択してください';
                    }
                } else {
                    [...state.files.keys(), ...state.folders.keys()].forEach(p => {
                        if (p.startsWith(node.path)) {
                            state.files.delete(p);
                            state.folders.delete(p);
                            if (state.activeFilePath === p) {
                                state.activeFilePath = null;
                                state.editor.display.wrapper.hidden = false;
                                DOM.viewImage.hidden = true;
                                DOM.viewInfo.parentNode.hidden = true;
                                DOM.viewDatabase.parentNode.hidden = true;
                                DOM.btnExecute.classList.add('hidden');
                                state.editor.setValue('');
                                DOM.btnSave.disabled = true;
                                DOM.pathDisplay.textContent = 'ファイルを選択してください';
                            }
                        }
                    });
                }
                renderFileTree();
            } catch (err) { console.error(err); }
        }

        function refreshDbList(data) {
            const {info, db} = data;
            const tbody = [];
            const schemas = db.exec("PRAGMA database_list")
                .flatMap(res => res.values.map(row => row.at(1)));
            for(let schema of schemas){
                const tables = db.exec(`SELECT name FROM ${schema}.sqlite_master WHERE type='table'`)
                    .flatMap(res => res.values.map(row => row.at(0)));
                const results = db.exec(tables.map(table => `PRAGMA ${schema}.table_info("${table}")`).join(";"));
                const values = tables.map((table, i) => [table, results[i].values.map(value => value.at(1))]);
                for(let entry of values){
                    const [table, fields] = entry;
                    for(let value of fields){
                        tbody.push([schema, table, value]);
                    }
                }
            }
            info.data = tbody;
        }

        function flattenJsdelivrFiles(files, prefix = '') {
          let results = {files: [], directories: []};
          for (const file of files) {
            const path = prefix + '/' + file.name;
            if (file.type === 'file') {
              results.files.push(path);
            } else if (file.type === 'directory' && file.files) {
              const sub = flattenJsdelivrFiles(file.files, path);
              results.directories.push(path + '/');
              results.files = results.files.concat(sub.files);
              results.directories = results.directories.concat(sub.directories);
            }
          }
          return results;
        }

        async function listFromJsdelivr() {
          state.cdn = null;
          DOM.packageArea.textContent = '読み込み中...';
          const selectFile = document.getElementById('import-file-path');
          selectFile.innerHTML = '<option value="/">/</option>';

          const source = DOM.inputImportSource.value;
          const [pkgName, versionTag] = DOM.inputImportPackage.value.split('@');

          try {
            const res = await fetch(`https://data.jsdelivr.com/v1/packages/${source}/${pkgName}/`);
            const data = await res.json();
            const found = data.versions.find(v => (versionTag || 'latest') === 'latest' ? true : v.version.startsWith(versionTag));

            if (!found) {
              DOM.packageArea.textContent = 'パッケージが見つかりません';
              return;
            }

            const resTree = await fetch(found.links.self);
            const treeData = await resTree.json();

            // ファイルリストの構築
            const flatPaths = flattenJsdelivrFiles(treeData.files);
            flatPaths.directories.forEach(path => {
              const opt = document.createElement('option');
              opt.value = path;
              opt.textContent = path;
              selectFile.appendChild(opt);
            });

            // READMEの表示
            const readme = treeData.files.find(f => f.name.toLowerCase() === 'readme.md');
            if (readme) {
              const resMd = await fetch(`https://cdn.jsdelivr.net/${source}/${pkgName}@${found.version}/${readme.name}`);
              DOM.packageArea.innerHTML = marked.parse(await resMd.text());
            } else {
              DOM.packageArea.textContent = 'READMEが見つかりません';
            }

            state.cdn = { source, name: pkgName, version: found.version, flatPaths };
            DOM.btnConfirmImportModal.disabled = false;
            DOM.btnConfirmImportModal.classList.remove('opacity-50', 'cursor-not-allowed');

          } catch (err) {
            DOM.packageArea.textContent = 'エラー: ' + err.message;
          }
        }

        async function importFromJsdelivr() {
          if (!state.cdn) return;

          const sourcePath = document.getElementById('import-file-path').value; // CDN上の起点パス
          const localDestPath = document.getElementById('import-local-dest').value; // ローカルの保存先パス

          DOM.btnConfirmImportModal.disabled = true;
          DOM.packageArea.textContent = 'インポート中...';

          const { source, name, version, flatPaths } = state.cdn;
          const baseUrl = `https://cdn.jsdelivr.net/${source}/${name}@${version}`;

          try {
            // 1. 対象となるファイルリストを絞り込み
            // sourcePath が "/" の場合は全ファイル、それ以外は前方一致でフィルタ
            const targets = flatPaths.files.filter(path => sourcePath === '/' || path.startsWith(sourcePath));

            for (const filePath of targets) {
              // CDNからファイル取得
              const response = await fetch(`${baseUrl}${filePath}`);
              if (!response.ok) throw new Error(`Failed to fetch: ${filePath}`);
              const blob = await response.blob();

              // 2. ローカル保存先のディレクトリを解決 (再帰的に作成)
              const relativePath = sourcePath === '/' ? filePath.slice(1) : filePath.replace(sourcePath, '');
              const pathParts = relativePath.split('/').filter(Boolean);
              const fileName = pathParts.pop();

              // 起点となるディレクトリハンドルを取得
              let currentDirHandle = state.folders.get(localDestPath);

              // 中間ディレクトリの作成
              for (const part of pathParts) {
                currentDirHandle = await currentDirHandle.getDirectoryHandle(part, { create: true });
              }

              // 3. ファイルの書き込み
              const fileHandle = await currentDirHandle.getFileHandle(fileName, { create: true });
              const writable = await fileHandle.createWritable();
              await writable.write(blob);
              await writable.close();
            }

            // 4. 後処理
            DOM.packageArea.textContent = `${targets.length} 個のファイルをインポートしました。`;

            // 全ディレクトリを再スキャンしてツリーを更新
            await scanDirectory(state.rootHandle);
            renderFileTree();
            if (state.files.has('/' + SNIPPETS_FILENAME)) await updateSnippetUI();

            setTimeout(() => {
              hideImportModal();
              DOM.btnConfirmImportModal.disabled = false;
            }, 1500);

          } catch (err) {
            console.error(err);
            DOM.packageArea.textContent = 'インポート失敗: ' + err.message;
            DOM.btnConfirmImportModal.disabled = false;
          }
        }

        /**
         * Event Listeners
         */
        window.onload = async () => {
            initEditor();

            DOM.tabFiles.onclick = () => {
                DOM.tabFiles.className = 'flex-1 py-2 text-sm font-medium bg-gray-700 border-b-2 border-blue-500';
                DOM.tabSnippets.className = 'flex-1 py-2 text-sm font-medium text-gray-400 hover:text-white';
                DOM.containerFiles.classList.remove('hidden');
                DOM.containerSnippets.classList.add('hidden');
            };
            DOM.tabSnippets.onclick = () => {
                DOM.tabSnippets.className = 'flex-1 py-2 text-sm font-medium bg-gray-700 border-b-2 border-blue-500';
                DOM.tabFiles.className = 'flex-1 py-2 text-sm font-medium text-gray-400 hover:text-white';
                DOM.containerSnippets.classList.remove('hidden');
                DOM.containerFiles.classList.add('hidden');
            };

            DOM.btnOpenDir.onclick = async () => {
                try {
                    const h = await window.showDirectoryPicker();
                    await saveHandle(h);
                    loadDirectory(h);
                } catch(e) {}
            };
            DOM.btnRestoreDir.onclick = async () => {
                const h = await getHandle();
                if (h && (await h.requestPermission({ mode: 'readwrite' })) === 'granted') {
                    loadDirectory(h);
                }
            };
            DOM.btnSave.onclick = saveCurrentFile;
            DOM.btnCancelModal.onclick = hideModal;
            DOM.btnConfirmModal.onclick = createNewItem;
            DOM.inputNewItemName.onkeypress = (e) => { e.key === 'Enter' && createNewItem(); };
            DOM.btnImport.onclick = showImportModal;
            DOM.btnCancelImportModal.onclick = hideImportModal;
            DOM.btnCheckImportModal.onclick = listFromJsdelivr;
            DOM.btnConfirmImportModal.onclick = importFromJsdelivr;
            
            DOM.typeFile.onclick = () => setCreateType('file');
            DOM.typeFolder.onclick = () => setCreateType('folder');

            DOM.btnExecute.onclick = () => {
                if (!state.activeFilePath) return;
                const fileData = state.files.get(state.activeFilePath);
                const fileType = getTypeByExtension(state.activeFilePath);
                try {
                    if (fileType.binary && fileType.view === 'database') {
                        const {db, table} = fileData.data;
                        const results = db.exec(state.editor.getValue());
                        const result = (results.length > 0) ? results[0] : {values: [], columns: []};
                        const ctx = DOM.viewDatabase.pdep6ph1vp.getContext(null);
                        const font = "12px 'Fira Code', monospace";
                        const option = document.createElement("option");
                        const w = result.values.reduce((res, row) => {
                            for(let i = res.length - 1; i >= 0; i--){
                                const {width, height} = CanvasTableRenderer.measureMultilineText(ctx, `${row.at(i) ?? '      '}`, "transparent", font);
                                res[i] = Math.max(res[i], width);
                                row.height = Math.max(12, height);
                            }
                            row.height = Math.min(row.height + 4, 250);
                            return res;
                        }, result.columns.map(text => CanvasTableRenderer.measureMultilineText(ctx, `${text}`, "transparent", font).width));
                        Object.assign(table, {
                            data: result.values,
                            header: result.columns,
                            getWidth(columnNo){
                                if(columnNo == null){
                                    return 50;
                                }
                                return w[columnNo];
                            }
                        });
                        refreshDbList(fileData.data);
                        DOM.viewInfo.rerender();
                        DOM.viewDatabase.rerender();
                    }
                } catch(e) {
                    console.log(e);
                }
            };

            const saved = await getHandle();
            if (saved) DOM.btnRestoreDir.classList.remove('hidden');
        };
    </script>
</body>
</html>
